<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Simple E-Voting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow-sm">
                    <div class="card-header text-center fw-bold">
                        E-Voting System
                    </div>

                    <div class="card-body">
                        <div class="mb-3">
                            <label for="voterId" class="form-label">Voter ID</label>
                            <input type="text" id="voterId" class="form-control" placeholder="Enter your 5-digit voter ID" />
                        </div>

                        <div class="d-grid gap-2 mb-3">
                            <button class="btn btn-primary" onclick="vote('Ini')">
                                Vote for Ini
                            </button>

                            <button class="btn btn-success" onclick="vote('Tinubu')">
                                Vote for Tinubu
                            </button>
                        </div>

                        <div id="message" class="alert d-none"></div>

                        <hr />
                        <h6 class="text-center">Results</h6>
                        <p class="text-center mb-1">
                            Ini: <strong id="aliceVotes">0</strong>
                        </p>
                        <p class="text-center">
                            Tinubu: <strong id="bobVotes">0</strong>
                        </p>
                    </div>

                    <div class="card-footer text-center text-muted small">
                        INEC e-voting System
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
