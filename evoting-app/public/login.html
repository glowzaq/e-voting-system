<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | E-Vote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body class="login-page">
    <nav class="navbar-custom">
        <div class="container d-flex align-items-center justify-content-between">
            <a class="brand d-flex align-items-center" href="/">
                <span class="brand-mark">E</span>-Vote
            </a>

            <div class="nav-links d-none d-md-flex align-items-center gap-4">
                <a href="/how-to-vote.html">How to Vote</a>
                <a href="/about.html">About Us</a>
            </div>

            <div class="d-flex align-items-center gap-2">
                <a id="dashboardButton" class="btn btn-sm rounded-pill px-3 d-none" href="/dashboard"
                    style="border:1px solid var(--green-mid); color:var(--green-mid); text-decoration:none;">Dashboard</a>
                <a id="loginButton" class="btn-nav-login" href="/login.html">Login</a>
                <a id="registerButton" class="btn btn-sm px-3" href="/register.html"
                    style="border:2px solid var(--green-deep); border-radius: 10px; color:var(--green-deep); font-family:'Syne',sans-serif; font-weight:700; background:#D1EED8; text-decoration:none;">Register</a>
            </div>
        </div>
    </nav>

    <main class="login-container">
        <div style="width: 100%; max-width: 450px; margin: 0 auto;">
            <div class="login-left">
                <h1 class="fade-up delay-2">Login into your Account</h1>
            </div>

            <div class="login-card fade-up delay-3">
                <div class="login-card-header">
                    <h2>Good to see you again!</h2>
                    <p>Access your voting dashboard</p>
                </div>

                <form id="loginForm" class="fade-up delay-4">
                    <div class="form-group">
                        <label for="email">Your email</label>
                        <input id="email" type="email" placeholder="you@example.com" required />
                    </div>

                    <div class="form-group">
                        <label for="password">Your password</label>
                        <input id="password" type="password" placeholder="••••••••" required />
                    </div>

                    <div class="form-actions">
                        <label style="margin: 0; color: var(--green-deep); font-weight: 500;">
                            <input type="checkbox" style="margin-right: 0.5rem;"> Remember me
                        </label>
                        <a href="#">Forgot password?</a>
                    </div>

                    <button type="submit" class="login-btn">Sign In</button>
                    <p id="loginMessage"></p>
                </form>

                <div class="signup-link">
                    Don't have an account?
                    <a href="register.html">Sign up</a>
                </div>
            </div>
        </div>
    </main>

    <div class="login-right fade-up delay-5"
        style="display: none; position: absolute; right: 3rem; top: 50%; transform: translateY(-50%); width: 250px;">
        <h3>New Here?</h3>
        <p>Create an account and start voting securely today</p>
        <a href="/register.html" class="signup-cta-btn">Sign up</a>
    </div>

    <script src="login.js"></script>
</body>

</html>
