<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | E-Vote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --green-dark: #1a4d1f;
            --green-deep: #0f2e13;
            --green-mid: #2e7d32;
            --green-blob: #236b28;
            --green-light: #c8e6c9;
            --white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.55);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--green-deep);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: var(--green-blob);
            top: -150px;
            right: -120px;
            border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
            opacity: 0.45;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            width: 350px;
            height: 350px;
            background: var(--green-mid);
            bottom: -80px;
            left: -60px;
            border-radius: 50%;
            opacity: 0.2;
            pointer-events: none;
        }

        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
            animation: fadeUp 0.6s ease forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--white);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 2rem;
        }

        .brand-mark {
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 800;
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 193, 7, 0.12);
            border: 1px solid rgba(255, 193, 7, 0.25);
            color: #ffd54f;
            border-radius: 100px;
            padding: 0.3rem 0.9rem;
            font-size: 0.72rem;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.9rem;
            letter-spacing: -0.5px;
            color: var(--white);
            margin-bottom: 0.4rem;
        }

        .sub {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 300;
            margin-bottom: 2rem;
        }

        .field-label {
            font-family: 'Syne', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.55);
            display: block;
            margin-bottom: 0.4rem;
        }

        .field-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.14);
            border-radius: 10px;
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            padding: 0.7rem 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 1.2rem;
        }

        .field-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .field-input:focus {
            outline: none;
            border-color: #ffd54f;
            box-shadow: 0 0 0 3px rgba(255, 213, 79, 0.15);
            background: rgba(255, 255, 255, 0.11);
        }

        .btn-admin-login {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            background: var(--white);
            color: var(--green-deep);
            border: none;
            border-radius: 100px;
            padding: 0.8rem 2rem;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 0.5rem;
        }

        .btn-admin-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.25);
        }

        .btn-admin-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-box {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.83rem;
            margin-bottom: 1rem;
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--white);
        }
    </style>
</head>

<body>

    <div class="login-card">
        <a href="/" class="brand">
            <span class="brand-mark">E</span>-Vote
        </a>

        <div class="admin-badge">⚙ Admin Access</div>
        <h1>Admin Login</h1>
        <p class="sub">Restricted area. Authorised personnel only.</p>

        <div class="error-box" id="errorBox"></div>

        <div>
            <label class="field-label" for="username">Username</label>
            <input type="text" id="username" class="field-input" placeholder="admin" autocomplete="off" />

            <label class="field-label" for="password">Password</label>
            <input type="password" id="password" class="field-input" placeholder="••••••••" />

            <button class="btn-admin-login" id="loginBtn" onclick="adminLogin()">
                Sign in as Admin
            </button>
        </div>

        <a href="/" class="back-link">← Back to main site</a>
    </div>

    <script>
        // If already logged in as admin, go straight to admin dashboard
        if (localStorage.getItem("adminToken")) {
            window.location.href = "/admin.html";
        }

        async function adminLogin() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const errorBox = document.getElementById("errorBox");
            const btn = document.getElementById("loginBtn");

            errorBox.style.display = "none";

            if (!username || !password) {
                errorBox.textContent = "Please enter both username and password.";
                errorBox.style.display = "block";
                return;
            }

            btn.disabled = true;
            btn.textContent = "Signing in...";

            try {
                const res = await fetch("/admin/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password }),
                });

                const data = await res.json();

                if (!res.ok || !data.token) {
                    errorBox.textContent = data.error || "Login failed.";
                    errorBox.style.display = "block";
                    btn.disabled = false;
                    btn.textContent = "Sign in as Admin";
                    return;
                }

                localStorage.setItem("adminToken", data.token);
                window.location.href = "/admin.html";
            } catch (err) {
                errorBox.textContent = "Server error. Please try again.";
                errorBox.style.display = "block";
                btn.disabled = false;
                btn.textContent = "Sign in as Admin";
            }
        }

        // Allow Enter key to submit
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") adminLogin();
        });
    </script>
</body>

</html>
