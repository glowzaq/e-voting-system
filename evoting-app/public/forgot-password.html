<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | E-Vote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body class="login-page">
    <nav class="navbar-custom">
        <div class="container d-flex align-items-center justify-content-between">
            <a class="brand d-flex align-items-center" href="/">
                <span class="brand-mark">E</span>-Vote
            </a>

            <div class="nav-links d-none d-md-flex align-items-center gap-4">
                <a href="/how-to-vote.html">How to Vote</a>
                <a href="/about.html">About Us</a>
            </div>

            <div class="d-flex align-items-center gap-2">
                <a class="btn-nav-login" href="/login.html">Login</a>
                <a class="btn btn-sm px-3" href="/register.html"
                    style="border:2px solid var(--green-deep); border-radius: 10px; color:var(--green-deep); font-family:'Syne',sans-serif; font-weight:700; background:#D1EED8; text-decoration:none;">Register</a>
            </div>
        </div>
    </nav>

    <main class="login-container">
        <div style="width: 100%; max-width: 450px; margin: 0 auto;">
            <div class="login-left">
                <h1 class="fade-up delay-2">Reset your password</h1>
                <p class="fade-up delay-3">Enter the email and national ID used during registration, then choose a new
                    password.</p>
            </div>

            <div class="login-card fade-up delay-4">
                <div class="login-card-header">
                    <h2>Forgot password?</h2>
                    <p>Reset your login credentials securely.</p>
                </div>

                <form id="forgotPasswordForm" class="fade-up delay-5">
                    <div class="form-group">
                        <label for="email">Registered email</label>
                        <input id="email" type="email" placeholder="you@example.com" required />
                    </div>

                    <div class="form-group">
                        <label for="nationalId">National ID</label>
                        <input id="nationalId" type="text" placeholder="10 digits" pattern="\d{10}" maxlength="10"
                            required />
                    </div>

                    <div class="form-group">
                        <label for="newPassword">New password</label>
                        <input id="newPassword" type="password" placeholder="New password" required />
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm new password</label>
                        <input id="confirmPassword" type="password" placeholder="Repeat password" required />
                    </div>

                    <button type="submit" class="login-btn">Reset password</button>
                    <p id="resetMessage"></p>
                </form>

                <div class="signup-link">
                    Remembered your password? <a href="/login.html">Sign in</a>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="alerts.js"></script>
    <script src="forgot-password.js"></script>
</body>

</html>
